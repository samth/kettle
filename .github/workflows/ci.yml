name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Racket
        uses: Bogdanp/setup-racket@v1.12
        with:
          architecture: x64
          distribution: full
          version: stable

      - name: Install tmux
        run: sudo apt-get update && sudo apt-get install -y tmux

      - name: Install modified ansi package from fork
        run: raco pkg install --auto --no-docs https://github.com/samth/racket-ansi.git?path=ansi#kettle-extensions

      - name: Install packages
        run: raco pkg install --auto --no-docs ./kettle-lib ./kettle-examples ./kettle-doc ./kettle-test ./kettle

      - name: Check package dependencies
        run: raco setup --check-pkg-deps --pkgs kettle-lib kettle-doc kettle-examples kettle-test kettle

      - name: Run unit and integration tests
        run: >-
          raco test -y
          kettle-test/kettle/tests/test-input.rkt
          kettle-test/kettle/tests/test-renderer.rkt
          kettle-test/kettle/tests/test-counter.rkt
          kettle-test/kettle/tests/test-stopwatch.rkt
          kettle-test/kettle/tests/test-todo.rkt
          kettle-test/kettle/tests/test-viewer.rkt
          kettle-test/kettle/tests/test-fps.rkt
          kettle-test/kettle/tests/test-integration.rkt

      - name: Run e2e tests
        run: raco test -y kettle-test/kettle/tests/test-e2e.rkt
