name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Racket
        uses: Bogdanp/setup-racket@v1.12
        with:
          architecture: x64
          distribution: full
          version: stable

      - name: Install tmux
        run: sudo apt-get update && sudo apt-get install -y tmux

      - name: Install packages
        run: raco pkg install --auto --no-docs ./kettle-lib ./kettle-examples ./kettle-doc ./kettle-test ./kettle

      - name: Run unit and integration tests
        run: |
          raco test -y kettle-test/kettle/tests/test-counter.rkt
          raco test -y kettle-test/kettle/tests/test-stopwatch.rkt
          raco test -y kettle-test/kettle/tests/test-todo.rkt
          raco test -y kettle-test/kettle/tests/test-viewer.rkt
          raco test -y kettle-test/kettle/tests/test-fps.rkt
          raco test -y kettle-test/kettle/tests/test-integration.rkt

      - name: Run e2e tests
        run: raco test -y kettle-test/kettle/tests/test-e2e.rkt
